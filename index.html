<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> </title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    #vault {
      position: fixed; inset: 0;
      background: #ffffff;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #vault.revealing {
      animation: vaultCrack 1.8s forwards;
    }

    @keyframes vaultCrack {
      0%   { opacity: 1; background: #ffffff; }
      20%  { opacity: 1; background: #ffffff; box-shadow: inset 0 0 0 2px #ff6800; }
      40%  { opacity: 1; background: #0a0a0a; }
      60%  { opacity: 0.6; }
      80%  { opacity: 0.2; }
      100% { opacity: 0; pointer-events: none; }
    }

    #vault.revealing::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,104,0,0.03) 2px, rgba(255,104,0,0.03) 4px
      );
      animation: scanDown 1.8s forwards;
    }

    @keyframes scanDown {
      0%   { opacity: 0; }
      30%  { opacity: 1; }
      100% { opacity: 0; }
    }

    #app {
      position: fixed; inset: 0;
      background: #080808;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.5s ease 1.4s;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    #app.visible { opacity: 1; }

    #app::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,104,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,104,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    #app::after {
      content: '';
      position: absolute;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,104,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 700px;
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.6s ease 1.8s;
    }

    #app.visible .header { opacity: 1; transform: translateY(0); }

    .header-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      color: #ff6800;
      letter-spacing: 0.2em;
      text-shadow: 0 0 30px rgba(255,104,0,0.5), 0 0 60px rgba(255,104,0,0.2);
      line-height: 1;
    }

    .header-line {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, #ff6800, transparent);
      margin: 1rem 0 0.5rem;
      opacity: 0.6;
    }

    .header-sub {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: #ff6800;
      opacity: 0.4;
      text-transform: uppercase;
    }

    .mode-bar {
      display: flex;
      gap: 1px;
      margin-bottom: 1.5rem;
      background: #1a0a00;
      border: 1px solid #2a1500;
      padding: 4px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s ease 2s;
    }

    #app.visible .mode-bar { opacity: 1; transform: translateY(0); }

    .mode-btn {
      flex: 1;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.7rem;
      background: transparent;
      border: none;
      color: #ff6800;
      opacity: 0.35;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .mode-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: #ff6800;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .mode-btn span { position: relative; z-index: 1; }

    .mode-btn.active { opacity: 1; color: #080808; }
    .mode-btn.active::before { opacity: 1; }

    .panel {
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.5s ease 2.1s;
    }

    #app.visible .panel { opacity: 1; transform: translateY(0); }

    .box-label {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: #ff6800;
      opacity: 0.5;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .box-label::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(255,104,0,0.3), transparent);
    }

    textarea {
      width: 100%;
      height: 130px;
      background: #0d0d0d;
      border: 1px solid #2a1500;
      border-left: 2px solid #ff6800;
      color: #ff9944;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      padding: 1rem;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: #ff6800;
    }

    textarea::placeholder { color: rgba(255,104,0,0.2); }

    textarea:focus {
      border-color: #ff6800;
      box-shadow: 0 0 20px rgba(255,104,0,0.1), inset 0 0 20px rgba(255,104,0,0.03);
    }

    .exec-wrap {
      display: flex; justify-content: center;
      margin: 1.2rem 0;
    }

    .exec-btn {
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #080808;
      background: #ff6800;
      border: none;
      padding: 0.85rem 3rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(255,104,0,0.3);
    }

    .exec-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .exec-btn:hover { background: #ff8c00; box-shadow: 0 0 35px rgba(255,104,0,0.5); }
    .exec-btn:hover::before { transform: translateX(100%); }
    .exec-btn:active { transform: scale(0.97); }

    .output-box {
      width: 100%;
      min-height: 130px;
      background: #0d0d0d;
      border: 1px solid #2a1500;
      border-left: 2px solid rgba(255,104,0,0.3);
      color: #ff6800;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      padding: 1rem;
      word-break: break-all;
      white-space: pre-wrap;
      position: relative;
      transition: border-color 0.3s;
      cursor: pointer;
    }

    .output-box.has-output {
      border-left-color: #ff6800;
      box-shadow: 0 0 20px rgba(255,104,0,0.07);
    }

    .output-placeholder { color: rgba(255,104,0,0.18); font-size: 0.78rem; }

    .copy-hint {
      position: absolute; bottom: 0.5rem; right: 0.75rem;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: rgba(255,104,0,0.3);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .output-box.has-output:hover .copy-hint { opacity: 1; }

    .copied-flash {
      position: absolute; inset: 0;
      background: rgba(255,104,0,0.08);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: #ff6800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .output-box.copied .copied-flash { opacity: 1; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor {
      display: inline-block;
      width: 8px; height: 1em;
      background: #ff6800;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: rgba(255,104,0,0.15);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.5s ease 2.4s;
    }

    #app.visible .footer { opacity: 1; }

    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 1;
    }

    @keyframes flicker {
      0%,100%{opacity:1} 10%{opacity:0.9} 20%{opacity:1} 30%{opacity:0.85}
      40%{opacity:1} 50%{opacity:0.95} 60%{opacity:1}
    }

    #app.visible { animation: flicker 0.4s ease 1.4s; }

    #vault.closing {
      display: block !important;
      animation: vaultClose 1.8s forwards;
    }

    @keyframes vaultClose {
      0%   { opacity: 0; background: #080808; }
      15%  { opacity: 0.3; background: #080808; }
      30%  { opacity: 1; background: #080808; box-shadow: inset 0 0 80px rgba(255,104,0,0.15); }
      50%  { opacity: 1; background: #111111; box-shadow: inset 0 0 0 3px #ff6800; }
      70%  { opacity: 1; background: #ffffff; box-shadow: inset 0 0 0 1px #ff6800; }
      85%  { opacity: 1; background: #ffffff; box-shadow: none; }
      100% { opacity: 1; background: #ffffff; }
    }

    #vault.closing::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,104,0,0.05) 2px, rgba(255,104,0,0.05) 4px
      );
      animation: scanClose 1.8s forwards;
    }

    @keyframes scanClose {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      70%  { opacity: 0.3; }
      100% { opacity: 0; }
    }

    #app.closing { animation: appClose 1.0s forwards; }

    @keyframes appClose {
      0%   { opacity: 1; }
      20%  { opacity: 0.8; filter: brightness(1.5) saturate(2); }
      40%  { opacity: 0.4; filter: brightness(0.5); }
      60%  { opacity: 0.1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="vault"></div>

  <div id="app">
    <div class="scanlines"></div>
    <div class="container">

      <div class="header">
        <div class="header-title">CIPHER</div>
        <div class="header-line"></div>
        <div class="header-sub">AES-256 // end-to-end // zero trace // By HardiCar</div>
      </div>

      <div class="mode-bar">
        <button class="mode-btn active" id="encryptBtn" onclick="setMode('encrypt')">
          <span>⬡ Encrypt</span>
        </button>
        <button class="mode-btn" id="decryptBtn" onclick="setMode('decrypt')">
          <span>⬡ Decrypt</span>
        </button>
      </div>

      <div class="panel">
        <div class="box-label">input message</div>
        <textarea id="inputBox" placeholder="Enter message here..."></textarea>

        <div class="exec-wrap">
          <button class="exec-btn" onclick="execute()">
            <span id="btnLabel">ENCRYPT</span>
          </button>
        </div>

        <div class="box-label">output</div>
        <div class="output-box" id="outputBox" onclick="copyOutput()">
          <span class="output-placeholder" id="outputPlaceholder">// output will appear here</span>
          <span id="outputText" style="display:none"></span>
          <div class="copy-hint">click to copy</div>
          <div class="copied-flash">COPIED</div>
        </div>
      </div>

      <div class="footer">type "reveal" to show // type "goodbye" to hide // click output to copy</div>

    </div>
  </div>

  <script>
    let typed = '';
    let revealed = false;
    let transitioning = false;

    document.addEventListener('keydown', (e) => {
      if (document.activeElement === document.getElementById('inputBox')) return;

      typed += e.key.toLowerCase();
      if (typed.length > 6) typed = typed.slice(-6);

      if (typed === 'reveal' && !revealed && !transitioning) {
        revealed = true;
        transitioning = true;
        triggerReveal();
      }

      if (typed.slice(-3) === 'goodbye' && revealed && !transitioning) {
        transitioning = true;
        triggerClose();
      }
    });

    function triggerReveal() {
      const vault = document.getElementById('vault');
      const app = document.getElementById('app');
      vault.style.display = 'block';
      vault.classList.remove('closing');
      vault.classList.add('revealing');
      setTimeout(() => {
        app.classList.add('visible');
        vault.style.display = 'none';
        transitioning = false;
        typed = '';
      }, 1600);
    }

    function triggerClose() {
      const vault = document.getElementById('vault');
      const app = document.getElementById('app');

      vault.style.display = 'block';
      vault.style.opacity = '0';
      vault.classList.remove('revealing');
      app.classList.add('closing');

      setTimeout(() => { vault.classList.add('closing'); }, 50);

      setTimeout(() => {
        app.classList.remove('visible', 'closing');
        vault.classList.remove('closing');
        vault.style.opacity = '1';
        vault.style.background = '#ffffff';
        revealed = false;
        transitioning = false;
        typed = '';
        document.getElementById('inputBox').value = '';
        clearOutput();
      }, 1800);
    }

    let mode = 'encrypt';

    function setMode(m) {
      mode = m;
      document.getElementById('encryptBtn').classList.toggle('active', m === 'encrypt');
      document.getElementById('decryptBtn').classList.toggle('active', m === 'decrypt');
      document.getElementById('btnLabel').textContent = m.toUpperCase();
      document.getElementById('inputBox').value = '';
      clearOutput();
      document.getElementById('inputBox').placeholder =
        m === 'encrypt' ? 'Enter message to encrypt...' : 'Enter encrypted text to decrypt...';
    }

    const SECRET = 'CIPHER_VOID_STATIC_KEY_2024_X9Z';

    async function deriveKey(secret) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(secret), { name: 'PBKDF2' }, false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: enc.encode('cipher_salt_v1'), iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
      );
    }

    function bufToHex(buf) {
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function hexToBuf(hex) {
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < hex.length; i += 2)
        bytes[i/2] = parseInt(hex.substr(i, 2), 16);
      return bytes;
    }

    async function encryptMsg(plaintext) {
      const key = await deriveKey(SECRET);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const enc = new TextEncoder();
      const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
      return bufToHex(iv) + ':' + bufToHex(ciphertext);
    }

    async function decryptMsg(encoded) {
      const [ivHex, ctHex] = encoded.split(':');
      if (!ivHex || !ctHex) throw new Error('Invalid format');
      const key = await deriveKey(SECRET);
      const iv = hexToBuf(ivHex);
      const ciphertext = hexToBuf(ctHex);
      const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
      return new TextDecoder().decode(plaintext);
    }

    async function execute() {
      const input = document.getElementById('inputBox').value.trim();
      if (!input) return;

      const btn = document.querySelector('.exec-btn');
      btn.textContent = '...';
      btn.disabled = true;

      try {
        const result = mode === 'encrypt' ? await encryptMsg(input) : await decryptMsg(input);
        typeOutput(result);
      } catch (e) {
        typeOutput('// ERROR: ' + (e.message || 'decryption failed — invalid input or key mismatch'));
      }

      btn.textContent = mode.toUpperCase();
      btn.disabled = false;
    }

    function typeOutput(text) {
      const box = document.getElementById('outputBox');
      const placeholder = document.getElementById('outputPlaceholder');
      const outputText = document.getElementById('outputText');

      placeholder.style.display = 'none';
      outputText.style.display = 'inline';
      outputText.textContent = '';
      box.classList.add('has-output');
      box.classList.remove('copied');

      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      outputText.after(cursor);

      let i = 0;
      const speed = Math.max(8, Math.min(30, 1500 / text.length));
      const interval = setInterval(() => {
        outputText.textContent += text[i];
        i++;
        if (i >= text.length) { clearInterval(interval); cursor.remove(); }
      }, speed);
    }

    function clearOutput() {
      const box = document.getElementById('outputBox');
      const placeholder = document.getElementById('outputPlaceholder');
      const outputText = document.getElementById('outputText');
      placeholder.style.display = 'inline';
      outputText.style.display = 'none';
      outputText.textContent = '';
      box.classList.remove('has-output', 'copied');
      box.querySelectorAll('.cursor').forEach(c => c.remove());
    }

    function copyOutput() {
      const text = document.getElementById('outputText').textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const box = document.getElementById('outputBox');
        box.classList.add('copied');
        setTimeout(() => box.classList.remove('copied'), 1000);
      });
    }

    document.getElementById('inputBox').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) execute();
    });
  </script>
</body>
</html>
